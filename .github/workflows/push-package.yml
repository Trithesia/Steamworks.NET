on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.304'
      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2
      - name: Build all platforms
        working-directory: Standalone2.0
        run: dotnet build -t:BatchBuild Steamworks.NET.Standard.sln
      - name: Pack
        working-directory: Standalone2.0
        run: nuget pack Steamworks.NET.nuspec -OutputDirectory bin
      - name: Push to GitHubTrithesia
        working-directory: Standalone2.0
        shell: pwsh
        run: |
          $pkg = Get-ChildItem bin -Filter *.nupkg -Recurse | Select-Object -First 1
          if (-not $pkg) { throw "No .nupkg found under bin/ - the Pack step produced nothing." }
          Write-Host "Pushing $($pkg.FullName)"
          dotnet nuget push $pkg.FullName -s https://nuget.pkg.github.com/Trithesia/index.json -k ${{ secrets.NUGET_SECRET }} --skip-duplicate
